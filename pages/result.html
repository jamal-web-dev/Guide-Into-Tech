<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide Into Tech</title>

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <!-- CSS -->
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/result.css" />
    <link rel="stylesheet" href="../styles/responsive.css" />
  </head>
  <body>
    <section class="results_section">
      <div class="results_container">
        <!-- HERO RESULT -->
        <div class="results_hero">
          <span class="badge">Recommended Path</span>

          <h1 id="careerTitle">Frontend Development</h1>

          <div class="compatibility">
            <span>Compatibility</span>
            <h2 id="compatibilityScore">92%</h2>
          </div>

          <!-- <p id="careerMeaning">
            You enjoy building interactive and visual experiences on the web.
          </p> -->
        </div>

        <!-- PATH COMPARISON -->
        <div class="results_grid">
          <div class="card primary">
            <h3>Why this Path?</h3>
            <p id="career_explanation"></p>
          </div>

          <div class="card secondary">
            <h3>Alternative Path</h3>

            <div id="altPaths">
              <!-- <p>UI/UX Design</p>
              <p>Data Analytics</p> -->
            </div>
          </div>
        </div>

        <!-- LEARNING INFO -->
        <div class="results_grid results_grid_two">
          <div class="card">
            <h3>Learning Speed</h3>
            <p id="learningSpeed"></p>
          </div>

          <div class="card">
            <h3>Weekly Hours</h3>
            <p id="weeklyHours"></p>
          </div>

          <div class="card">
            <h3>Timeline</h3>
            <p id="timeline"></p>
          </div>
        </div>

        <!-- CAREER EXPLANATION -->
        <div class="explanation_card">
          <h2>What This Career Means</h2>

          <p id="careerExplanation">
            <!-- Frontend Development focuses on building the visual and interactive
            parts of websites and applications that users see and interact with. -->
          </p>
        </div>

        <!-- SKILLS PREVIEW -->
        <div class="skills_card">
          <h2>Skills You'll Learn</h2>

          <div class="skills_grid">
            <div class="skill">HTML</div>
            <div class="skill">CSS</div>
            <div class="skill">JavaScript</div>
            <div class="skill">React</div>
          </div>
        </div>

        <a href="roadmap.html" class="cta_btn"> View Full Roadmap </a>
      </div>
    </section>

    <script src="../src/result.js"></script>
  </body>
</html>
